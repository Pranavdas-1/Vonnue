{% extends "base_casual.html" %}

{% block subtitle %}
<p>Add at least 2 speakers to compare. Fill in each speaker's specifications.</p>
{% endblock %}

{% block extra_css %}
<style>
    /* ── Speaker Cards ───────────────────────────── */
    .speakers-container {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .speaker-card {
        background: #fff;
        border: 1px solid #e7e5e4;
        border-radius: 0.85rem;
        padding: 1.5rem;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.03);
        transition: box-shadow 0.2s ease;
        animation: slideIn 0.3s ease;
    }

    .speaker-card:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(12px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .speaker-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.25rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid #f5f5f4;
    }

    .speaker-header h3 {
        font-size: 1rem;
        font-weight: 700;
        color: #292524;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .speaker-header h3 .num {
        width: 1.6rem;
        height: 1.6rem;
        background: linear-gradient(135deg, #ea580c, #f97316);
        color: #fff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.72rem;
        font-weight: 700;
    }

    .speaker-name-input {
        margin-bottom: 1rem;
    }

    .speaker-name-input input {
        font-size: 1rem;
        font-weight: 600;
        border: 1px dashed #d6d3d1;
        background: #fafaf9;
    }

    .speaker-name-input input:focus {
        border-style: solid;
    }

    /* ── Criteria Grid ────────────────────────────── */
    .criteria-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1rem;
    }

    .field-group {
        display: flex;
        flex-direction: column;
    }

    .field-group label .hint {
        font-weight: 400;
        color: #a8a29e;
        font-size: 0.7rem;
    }

    /* ── Action Bar ───────────────────────────────── */
    .action-bar {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #f5f5f4;
    }

    .action-bar .spacer {
        flex: 1;
    }

    .error-msg {
        display: none;
        padding: 0.7rem 1rem;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 0.5rem;
        color: #dc2626;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 1rem;
    }

    .error-msg.visible {
        display: block;
        animation: slideIn 0.2s ease;
    }
</style>
{% endblock %}

{% block content %}
<form id="speakerForm" method="post" action="/casual/speakers">
    <input type="hidden" name="speaker_count" id="speakerCount" value="2">

    <div id="errorMsg" class="error-msg">Please add at least 2 speakers.</div>

    <div class="speakers-container" id="speakersContainer">
        <!-- Speaker cards will be inserted by JS -->
    </div>

    <div class="action-bar">
        <button type="button" class="btn-secondary" id="addSpeakerBtn">
            ＋ Add Speaker
        </button>
        <span class="spacer"></span>
        <button type="submit" class="btn-primary">
            Continue to Weights →
        </button>
    </div>
</form>
{% endblock %}

{% block extra_js %}
<script>
    const clarityOptions = {{ clarity_options | tojson }};
    const chargingOptions = {{ charging_type_options | tojson }};
    const buildOptions = {{ build_options | tojson }};
    const multiPairOptions = {{ multi_pair_options | tojson }};
    const micOptions = {{ mic_options | tojson }};
    const appSupportOptions = ['No', 'Yes'];
    const brandReliabilityOptions = ['Low', 'Medium', 'High'];
    const standOrientationOptions = ['Horizontal Only', 'Vertical Only', 'Both (Flexible)'];

    let speakerCount = 0;

    function makeSelect(name, options) {
        let html = `<select name="${name}" required>`;
        for (const opt of options) {
            html += `<option value="${opt}">${opt}</option>`;
        }
        html += `</select>`;
        return html;
    }

    function addSpeaker() {
        const i = speakerCount;
        const card = document.createElement('div');
        card.className = 'speaker-card';
        card.id = `speaker-card-${i}`;
        card.innerHTML = `
            <div class="speaker-header">
                <h3><span class="num">${i + 1}</span> Speaker ${i + 1}</h3>
                ${i >= 2 ? `<button type="button" class="btn-danger" onclick="removeSpeaker(${i})">✕ Remove</button>` : ''}
            </div>

            <div class="speaker-name-input">
                <label for="name_${i}">Speaker Name</label>
                <input type="text" name="name_${i}" id="name_${i}" placeholder="e.g. JBL Flip 6" required>
            </div>

            <div class="criteria-grid">
                <div class="field-group">
                    <label>Price <span class="hint">(₹)</span></label>
                    <input type="number" name="price_${i}" min="0" step="1" placeholder="e.g. 5999" required>
                </div>
                <div class="field-group">
                    <label>Weight <span class="hint">(kg)</span></label>
                    <input type="number" name="physical_weight_${i}" min="0" step="0.01" placeholder="e.g. 0.55" required>
                </div>
                <div class="field-group">
                    <label>Sound Clarity</label>
                    ${makeSelect(`clarity_${i}`, clarityOptions)}
                </div>
                <div class="field-group">
                    <label>Bass Strength <span class="hint">(1–10)</span></label>
                    <input type="number" name="bass_${i}" min="1" max="10" step="1" placeholder="1–10" required>
                </div>
                <div class="field-group">
                    <label>Loudness <span class="hint">(Watts)</span></label>
                    <input type="number" name="wattage_${i}" min="0" step="0.1" placeholder="e.g. 30" required>
                </div>
                <div class="field-group">
                    <label>Battery Life <span class="hint">(Hours)</span></label>
                    <input type="number" name="battery_${i}" min="0" step="0.1" placeholder="e.g. 12" required>
                </div>
                <div class="field-group">
                    <label>Charging Type</label>
                    ${makeSelect(`charging_type_${i}`, chargingOptions)}
                </div>
                <div class="field-group">
                    <label>Charging Wattage <span class="hint">(W)</span></label>
                    <input type="number" name="charging_wattage_${i}" min="0" step="0.1" placeholder="e.g. 10" required>
                </div>
                <div class="field-group">
                    <label>Build Quality</label>
                    ${makeSelect(`build_${i}`, buildOptions)}
                </div>
                <div class="field-group">
                    <label>IP Rating <span class="hint">(e.g. IP67)</span></label>
                    <input type="text" name="ip_${i}" placeholder="e.g. IPX6, IP67" required>
                </div>
                <div class="field-group">
                    <label>Bluetooth Version</label>
                    <input type="number" name="bluetooth_${i}" min="1" max="6" step="0.1" placeholder="e.g. 5.3" required>
                </div>
                <div class="field-group">
                    <label>Multi-Pairing Support</label>
                    ${makeSelect(`multi_pair_${i}`, multiPairOptions)}
                </div>
                <div class="field-group">
                    <label>Microphone</label>
                    ${makeSelect(`mic_${i}`, micOptions)}
                </div>
                <div class="field-group">
                    <label>Number of Drivers</label>
                    <input type="number" name="drivers_${i}" min="1" step="1" placeholder="e.g. 2" required>
                </div>
                <div class="field-group">
                    <label>App Support</label>
                    ${makeSelect(`app_support_${i}`, appSupportOptions)}
                </div>
                <div class="field-group">
                    <label>Warranty <span class="hint">(Years)</span></label>
                    <input type="number" name="warranty_${i}" min="0" step="0.5" placeholder="e.g. 1" required>
                </div>
                <div class="field-group">
                    <label>Brand Reliability</label>
                    ${makeSelect(`brand_reliability_${i}`, brandReliabilityOptions)}
                </div>
                <div class="field-group">
                    <label>Stand Orientation</label>
                    ${makeSelect(`stand_orientation_${i}`, standOrientationOptions)}
                </div>
                <div class="field-group">
                    <label>Battery Size <span class="hint">(mAh, optional)</span></label>
                    <input type="number" name="battery_size_${i}" min="0" step="1" placeholder="e.g. 4800">
                </div>
            </div>
        `;
        document.getElementById('speakersContainer').appendChild(card);
        speakerCount++;
        document.getElementById('speakerCount').value = speakerCount;
        updateNumbers();
    }

    function removeSpeaker(index) {
        const card = document.getElementById(`speaker-card-${index}`);
        if (card) {
            card.style.animation = 'slideIn 0.2s ease reverse';
            setTimeout(() => {
                card.remove();
                // Re-index remaining speakers
                reindexSpeakers();
            }, 180);
        }
    }

    function reindexSpeakers() {
        const cards = document.querySelectorAll('.speaker-card');
        speakerCount = 0;

        cards.forEach((card, newIdx) => {
            card.id = `speaker-card-${newIdx}`;

            // Update header
            const numSpan = card.querySelector('.speaker-header .num');
            if (numSpan) numSpan.textContent = newIdx + 1;
            const h3 = card.querySelector('.speaker-header h3');
            if (h3) {
                const numEl = h3.querySelector('.num');
                h3.textContent = '';
                if (numEl) { numEl.textContent = newIdx + 1; h3.appendChild(numEl); }
                h3.append(` Speaker ${newIdx + 1}`);
            }

            // Update remove button
            const removeBtn = card.querySelector('.btn-danger');
            if (removeBtn) {
                if (newIdx < 2) {
                    removeBtn.remove();
                } else {
                    removeBtn.setAttribute('onclick', `removeSpeaker(${newIdx})`);
                }
            }

            // Update all input/select names
            card.querySelectorAll('input, select').forEach(el => {
                const name = el.getAttribute('name');
                if (name) {
                    const baseName = name.replace(/_\d+$/, '');
                    el.setAttribute('name', `${baseName}_${newIdx}`);
                }
                const id = el.getAttribute('id');
                if (id) {
                    const baseId = id.replace(/_\d+$/, '');
                    el.setAttribute('id', `${baseId}_${newIdx}`);
                }
            });

            // Update label for attributes
            card.querySelectorAll('label').forEach(lbl => {
                const forAttr = lbl.getAttribute('for');
                if (forAttr) {
                    const baseName = forAttr.replace(/_\d+$/, '');
                    lbl.setAttribute('for', `${baseName}_${newIdx}`);
                }
            });

            speakerCount++;
        });

        document.getElementById('speakerCount').value = speakerCount;
    }

    function updateNumbers() {
        const cards = document.querySelectorAll('.speaker-card');
        cards.forEach((card, idx) => {
            const numSpan = card.querySelector('.num');
            if (numSpan) numSpan.textContent = idx + 1;
        });
    }

    // Validation
    document.getElementById('speakerForm').addEventListener('submit', function (e) {
        const cards = document.querySelectorAll('.speaker-card');
        if (cards.length < 2) {
            e.preventDefault();
            const err = document.getElementById('errorMsg');
            err.classList.add('visible');
            setTimeout(() => err.classList.remove('visible'), 3000);
        }
    });

    // Add speaker button
    document.getElementById('addSpeakerBtn').addEventListener('click', addSpeaker);

    // Start with 2 speakers
    addSpeaker();
    addSpeaker();
</script>
{% endblock %}
